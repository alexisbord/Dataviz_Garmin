<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f8f9fd;
      display: flex;
      height: 100vh;
    }

    aside {
      width: 60px;
      background: #fff;
      padding: 10px 0;
      box-shadow: 2px 0 8px rgba(0, 0, 0, 0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      margin-top: 20px;
    }

    main {
      flex-grow: 1;
      padding: 30px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside>
    <div><a href="index.html"><span>🏠</span></a></div>
    <div><a href="#"><span>❤️‍🔥</span></a></div>
    <div><a href="running.html"><span>👣</span></a></div>
    <div><a href="#"><span>🛏️</span></a></div>
  </aside>

  <!-- Main -->
  <main>
    <h1 style="font-size: 24px; margin-bottom: 20px">Welcome back Alexis!</h1>
    <div style="display: flex; gap: 20px">
      
      <!-- Left Column -->
      <div class="card" style="width: 500px; height: 550px; display: flex; flex-direction: column">
        <h3>Last running activity:</h3>
        <div id="run-info" style="font-size: 16px; color: #222; margin-bottom: 18px"></div>
        <div style="flex-grow: 1; display: flex; justify-content: center; align-items: center;">
          <svg id="run-path"></svg>
        </div>
      </div>

      <!-- Right Column -->
      <div style="flex: 1; display: flex; flex-direction: column; gap: 20px">
        <!-- Sleep and Steps -->
        <div style="display: flex; gap: 20px; flex: 1">
          <!-- Sleep -->
          <div class="card" style="flex: 1; display: flex; flex-direction: column; justify-content: center">
            <h3>Sleep</h3>
            <div id="sleep-box" style="text-align: center; font-size: 16px; color: #222"></div>
          </div>

          <!-- Steps -->
          <div class="card" style="flex: 1; display: flex; flex-direction: column; justify-content: center">
            <h3>Steps</h3>
            <div style="font-size: 16px; color: #222">
              <strong>Today:</strong> 10,000 steps<br />
              <strong>Goal:</strong> 12,000 steps
            </div>
          </div>
        </div>

        <!-- Summary -->
        <div class="card" style="flex: 1; display: flex; flex-direction: column; justify-content: center">
          <h3>Last Week Summary</h3>
          <div style="font-size: 16px; color: #222">
            <strong>Distance:</strong> 42.5 km<br />
            <strong>Steps:</strong> 68,000<br />
            <strong>Sleep Avg:</strong> 7h 20min<br />
            <strong>Calories Burned:</strong> 3,800 kcal
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Fetch and render run path
    fetch('http://127.0.0.1:5000/api/last-run-records')
      .then(res => res.json())
      .then(data => {
        const cleaned = data.filter(d => d.lat && d.long).map(d => ({
          lat: d.lat * (180 / Math.pow(2, 31)),
          long: d.long * (180 / Math.pow(2, 31))
        }));

        const svg = d3.select("#run-path");
        svg.selectAll('*').remove();

        const width = 400;
        const height = 400;
        const margin = 10;

        const x = d3.scaleLinear().domain(d3.extent(cleaned, d => d.long)).range([margin, width - margin]);
        const y = d3.scaleLinear().domain(d3.extent(cleaned, d => d.lat)).range([height - margin, margin]);

        const line = d3.line()
          .x(d => x(d.long))
          .y(d => y(d.lat));

        svg.attr("width", width).attr("height", height);
        svg.append("path")
          .datum(cleaned)
          .attr("fill", "none")
          .attr("stroke", "#3b82f6")
          .attr("stroke-width", 2)
          .attr("d", line);
      });

    // Running summary
    fetch('http://127.0.0.1:5000/api/last-run-data')
      .then(res => res.json())
      .then(data => {
        const pace = data.avg_speed > 0 ? 60 / data.avg_speed : 0;
        const min = Math.floor(pace);
        const sec = Math.round((pace - min) * 60);
        const duration = (() => {
          const start = new Date(data.start_time);
          const stop = new Date(data.stop_time);
          const diff = Math.floor((stop - start) / 1000);
          const h = Math.floor(diff / 3600);
          const m = Math.floor((diff % 3600) / 60);
          const s = diff % 60;
          return `${h > 0 ? h + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        })();

        document.getElementById("run-info").innerHTML = `
          <div><strong>Date:</strong> ${new Date(data.start_time).toLocaleDateString()}</div>
          <div><strong>Distance:</strong> ${data.distance.toFixed(2)} km</div>
          <div><strong>Avg pace:</strong> ${min}:${sec.toString().padStart(2, '0')} min/km</div>
          <div><strong>Duration:</strong> ${duration}</div>
        `;
      });

    // Sleep data
    fetch('http://127.0.0.1:5000/api/last-week-sleep')
      .then(res => res.json())
      .then(data => {
        if (!data || data.length === 0) {
          document.getElementById("sleep-box").textContent = "No sleep data available.";
          return;
        }

        const d = data[0];
        const start = new Date(d.start);
        const end = new Date(d.end);
        const duration = d.total_sleep.slice(0, 5);

        document.getElementById("sleep-box").innerHTML = `
          <svg width="220" height="150">
            <path d="M30,100 A80,80 0 0,1 190,100" fill="none" stroke="#2563eb" stroke-width="6"/>
            <text x="110" y="75" text-anchor="middle" font-size="20" fill="#222" font-weight="bold">${duration}</text>
            <text x="30" y="115" text-anchor="middle" font-size="14" fill="#444">${start.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</text>
            <text x="190" y="115" text-anchor="middle" font-size="14" fill="#444">${end.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</text>
          </svg>
          <div><strong>Date:</strong> ${start.toLocaleDateString()}</div>
        `;
      });
  </script>

</body>
</html>
